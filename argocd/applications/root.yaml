# App-of-Apps — Application "raiz" que sincroniza todos os outros Applications
# em argocd/applications/. Aplicar UMA VEZ no cluster:
#
#   kubectl apply -n argocd -f argocd/applications/root.yaml
#
# A partir daí, qualquer novo Application adicionado ao diretório
# argocd/applications/ é detectado e sincronizado automaticamente —
# inclusive este próprio root (auto-update).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: hr-core
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: hr-core

  source:
    repoURL: https://github.com/diego64/hr-core.git
    targetRevision: main
    path: argocd/applications
    directory:
      recurse: false
      # Pega só .yaml direto no diretório; subdirs não são recursados.
      jsonnet: {}

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=false
      - PrunePropagationPolicy=foreground
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m

  # Mantém histórico curto — Argo CD guarda 10 revisões por padrão; 5 é
  # suficiente para rollback rápido sem inflar etcd.
  revisionHistoryLimit: 5
