# ATENÇÃO: este arquivo é apenas EXEMPLO. NÃO commitar segredos reais.
#
# Em produção, usar uma das opções:
#   - Sealed Secrets (Bitnami)       — encriptado no Git, decrypta no cluster
#   - External Secrets Operator       — busca de Vault/AWS Secrets Manager
#   - SOPS                            — encriptação simétrica + plugin kustomize
#
# Para dev local:
#   1. Gerar a chave RSA:
#      openssl genpkey -algorithm RSA -out private.pem -pkeyopt rsa_keygen_bits:2048
#   2. Criar o Secret:
#      kubectl -n hr-core-dev create secret generic auth-keys \
#        --from-file=private.pem=./private.pem \
#        --dry-run=client -o yaml | kubectl apply -f -
#
# Este arquivo NÃO é referenciado pelo kustomization — apenas documenta o shape.
apiVersion: v1
kind: Secret
metadata:
  name: auth-keys
  labels:
    app.kubernetes.io/name: auth
    app.kubernetes.io/component: auth
    app.kubernetes.io/part-of: hr-core
type: Opaque
data:
  # base64 da chave PEM (PKCS#8). Substituir pelo conteúdo real.
  private.pem: <base64-da-chave-rsa-pem-aqui>
