# Patch JSON-6902/strategic-merge: dev usa 1 réplica e recursos baixos.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: api-gateway
          resources:
            requests:
              cpu: '50m'
              memory: '96Mi'
            limits:
              cpu: '300m'
              memory: '192Mi'
