# ATENÇÃO: este arquivo é apenas EXEMPLO. NÃO commitar segredos reais.
#
# Em produção, use uma das opções:
#   - Sealed Secrets (Bitnami)       — encriptado no Git, decrypta no cluster
#   - External Secrets Operator       — busca de Vault/AWS Secrets Manager/etc.
#   - SOPS + kustomize plugin         — encriptação simétrica
#
# Para dev local: criar manualmente via kubectl:
#   kubectl -n hr-core create secret generic api-gateway \
#     --from-literal=AUTH_JWKS_URL='https://auth.hr-core.local/.well-known/jwks.json' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Este arquivo NÃO é referenciado pelo kustomization.yaml — apenas documenta o shape.
apiVersion: v1
kind: Secret
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: hr-core
type: Opaque
stringData:
  # URL do JWKS — público mas tratado como segredo porque é vetor de ataque
  # (se o atacante envenenar essa URL, JWTs forjados são aceitos)
  AUTH_JWKS_URL: 'https://auth.hr-core.local/.well-known/jwks.json'
