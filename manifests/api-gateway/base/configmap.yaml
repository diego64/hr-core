apiVersion: v1
kind: ConfigMap
metadata:
  name: api-gateway
  labels:
    app.kubernetes.io/name: api-gateway
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: hr-core
data:
  # Runtime
  NODE_ENV: 'production'
  HOST: '0.0.0.0'
  PORT: '3000'
  LOG_LEVEL: 'info'

  # Auth — issuer/audience (públicos); JWKS URL e segredos ficam no Secret
  AUTH_JWT_ISSUER: 'https://auth.hr-core.local'
  AUTH_JWT_AUDIENCE: 'hr-core'

  # Rate limit
  RATE_LIMIT_MAX: '100'
  RATE_LIMIT_WINDOW_MS: '60000'

  # CORS
  CORS_ORIGINS: ''
  CORS_CREDENTIALS: 'false'
  CORS_MAX_AGE: '86400'

  # Swagger
  SWAGGER_ENABLED: 'true'
  SWAGGER_ROUTE_PREFIX: '/docs'

  # OpenTelemetry
  OTEL_ENABLED: 'true'
  OTEL_SERVICE_NAME: 'api-gateway'
  OTEL_EXPORTER_OTLP_ENDPOINT: 'http://otel-collector.observability.svc.cluster.local:4318'

  # Downstreams — Service DNS dentro do mesmo namespace
  FUNCIONARIO_SERVICE_URL: 'http://funcionario.hr-core.svc.cluster.local:4001'
  FERIAS_SERVICE_URL: 'http://ferias.hr-core.svc.cluster.local:4002'
  AVALIACAO_SERVICE_URL: 'http://avaliacao.hr-core.svc.cluster.local:4003'
  FOLHA_PAGAMENTO_SERVICE_URL: 'http://folha-de-pagamento.hr-core.svc.cluster.local:4004'
